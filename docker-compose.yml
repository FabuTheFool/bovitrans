# ============================================================================
# docker-compose.yml — BoviTrans
# ============================================================================
# Servicios:
#   db   — PostgreSQL 16, con init.sql + volumen persistente
#   app  — Next.js (build local desde Dockerfile)
#
# Uso:
#   cp .env.example .env
#   docker compose up --build
#
# Limpieza:
#   docker compose down -v     # también borra el volumen de la DB
# ============================================================================

name: bovitrans

services:
  db:
    image: postgres:16-alpine
    container_name: bovitrans-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-bovitrans}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bovitrans_dev}
      POSTGRES_DB:       ${POSTGRES_DB:-bovitrans}
      TZ: UTC
    ports:
      # Exponer 5432 solo en host local para debugging con un cliente psql.
      - "127.0.0.1:5432:5432"
    volumes:
      - bovitrans-pgdata:/var/lib/postgresql/data
      # init.sql se ejecuta automáticamente solo en el primer arranque
      # (cuando el volumen está vacío).
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bovitrans} -d ${POSTGRES_DB:-bovitrans}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bovitrans-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bovitrans}:${POSTGRES_PASSWORD:-bovitrans_dev}@db:5432/${POSTGRES_DB:-bovitrans}
      NODE_ENV: production
      OSRM_BASE_URL: ${OSRM_BASE_URL:-https://router.project-osrm.org}
      NOMINATIM_BASE_URL: ${NOMINATIM_BASE_URL:-https://nominatim.openstreetmap.org}
      NEXT_PUBLIC_TILES_URL: ${NEXT_PUBLIC_TILES_URL:-https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png}
      NEXT_PUBLIC_DEFAULT_CURRENCY: ${NEXT_PUBLIC_DEFAULT_CURRENCY:-UYU}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  bovitrans-pgdata:
    name: bovitrans-pgdata
